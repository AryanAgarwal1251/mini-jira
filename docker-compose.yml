version: "3.9"

services:
  mongo:
    image: mongo:6
    container_name: mini-jira-mongo-test
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: mini-jira-backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mini-jira-mongo:27017/mini-jira
      - JWT_SECRET=supersecretkey
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: mini-jira-frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/mini-jira-frontend:/app
      - /app/node_modules

volumes:
  mongo-data: